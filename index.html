<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>動画アノテーター</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f12;
    --surface: #1a1a20;
    --surface2: #24242e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --text-dim: #7878a0;
    --border: #2e2e3e;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--text);
    flex: 1;
  }
  header h1 span { color: var(--accent); }

  #open-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  #file-input { display: none; }

  /* ── DROP ZONE ── */
  #drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
    padding: 32px;
    text-align: center;
  }
  #drop-zone svg { opacity: 0.35; }
  #drop-zone p { font-size: 15px; line-height: 1.6; }
  #drop-zone small { font-size: 12px; color: var(--text-dim); opacity: 0.6; }

  /* ── WORKSPACE ── */
  #workspace {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  #workspace.active { display: flex; }

  /* ── CANVAS AREA ── */
  #canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video-el {
    max-width: 100%;
    max-height: 100%;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  #draw-canvas {
    position: absolute;
    top: 0; left: 0;
    touch-action: none;
    cursor: crosshair;
  }

  /* ── CONTROLS BAR ── */
  #controls {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    flex-shrink: 0;
  }

  /* Video controls */
  #video-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .ctrl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    font-size: 18px;
    transition: background 0.15s;
  }
  .ctrl-btn:active { background: var(--accent); }

  #seek-bar {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  #time-label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 90px;
    text-align: right;
  }

  /* Drawing tools */
  #tool-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tool-group {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tool-btn {
    width: 36px; height: 36px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .tool-btn.active {
    background: var(--accent);
    color: #fff;
  }
  .tool-btn:not(.active):active { background: var(--border); }

  /* Color picker */
  #color-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 3px solid var(--border);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    flex-shrink: 0;
  }
  #color-input { opacity: 0; width: 0; height: 0; position: absolute; }

  /* Size slider */
  #size-slider {
    width: 80px;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  /* Clear / Undo buttons */
  #undo-btn { font-size: 14px; }
  #clear-btn { font-size: 13px; color: var(--accent2) !important; }
  #clear-btn.active { background: var(--accent2) !important; color: #fff !important; }

  /* opacity control */
  .label-sm {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>🎬 <span>動画</span>ドロー</h1>
  <button id="open-btn" onclick="document.getElementById('file-input').click()">動画を開く</button>
  <input type="file" id="file-input" accept="video/*">
</header>

<!-- Drop Zone -->
<div id="drop-zone">
  <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
    <rect x="8" y="14" width="56" height="44" rx="6" stroke="#6c63ff" stroke-width="3"/>
    <circle cx="26" cy="30" r="5" stroke="#6c63ff" stroke-width="2.5"/>
    <path d="M8 46l14-12 10 9 12-14 20 17" stroke="#6c63ff" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M36 36v-16M29 26l7-7 7 7" stroke="#ff6584" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <p>「動画を開く」ボタンで<br>動画ファイルを選択してください</p>
  <small>MP4 / MOV / WebM など対応</small>
</div>

<!-- Workspace -->
<div id="workspace">

  <!-- Canvas area -->
  <div id="canvas-area">
    <video id="video-el" playsinline></video>
    <canvas id="draw-canvas"></canvas>
  </div>

  <!-- Controls -->
  <div id="controls">

    <!-- Video controls row -->
    <div id="video-controls">
      <button class="ctrl-btn" id="play-btn" title="再生/一時停止">▶</button>
      <input type="range" id="seek-bar" min="0" max="1000" value="0" step="1">
      <span id="time-label">0:00 / 0:00</span>
    </div>

    <!-- Tool bar row -->
    <div id="tool-bar">

      <!-- Tools -->
      <div class="tool-group">
        <button class="tool-btn active" id="tool-pen"   data-tool="pen"   title="ペン">✏️</button>
        <button class="tool-btn"        id="tool-line"  data-tool="line"  title="直線">╱</button>
        <button class="tool-btn"        id="tool-rect"  data-tool="rect"  title="矩形">▭</button>
        <button class="tool-btn"        id="tool-circle"data-tool="circle"title="円">○</button>
        <button class="tool-btn"        id="tool-arrow" data-tool="arrow" title="矢印">➔</button>
        <button class="tool-btn"        id="tool-eraser"data-tool="eraser"title="消しゴム">🧹</button>
      </div>

      <!-- Color -->
      <div style="position:relative;display:flex;align-items:center;">
        <button id="color-btn" title="色を変える" style="background:#6c63ff;"></button>
        <input type="color" id="color-input" value="#6c63ff">
      </div>

      <!-- Size -->
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="label-sm">太さ</span>
        <input type="range" id="size-slider" min="1" max="30" value="4">
      </div>

      <!-- Undo / Clear -->
      <div class="tool-group">
        <button class="tool-btn" id="undo-btn" title="元に戻す">↩</button>
        <button class="tool-btn" id="clear-btn" title="全消去">✕</button>
      </div>

    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const state = {
  tool: 'pen',
  color: '#6c63ff',
  lineWidth: 4,
  drawing: false,
  startX: 0, startY: 0,
  strokes: [],       // committed strokes
  currentStroke: [], // live pen points
  snapshot: null,    // for shape preview
};

// ─── Elements ────────────────────────────────────────────
const fileInput   = document.getElementById('file-input');
const videoEl     = document.getElementById('video-el');
const canvas      = document.getElementById('draw-canvas');
const ctx         = canvas.getContext('2d');
const workspace   = document.getElementById('workspace');
const dropZone    = document.getElementById('drop-zone');
const canvasArea  = document.getElementById('canvas-area');
const playBtn     = document.getElementById('play-btn');
const seekBar     = document.getElementById('seek-bar');
const timeLabel   = document.getElementById('time-label');
const colorBtn    = document.getElementById('color-btn');
const colorInput  = document.getElementById('color-input');
const sizeSlider  = document.getElementById('size-slider');
const undoBtn     = document.getElementById('undo-btn');
const clearBtn    = document.getElementById('clear-btn');

// ─── File loading ─────────────────────────────────────────
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  videoEl.src = url;
  videoEl.load();
  dropZone.style.display = 'none';
  workspace.classList.add('active');
});

// ─── Video events ─────────────────────────────────────────
videoEl.addEventListener('loadedmetadata', () => {
  resizeCanvas();
});

videoEl.addEventListener('timeupdate', () => {
  if (!videoEl.duration) return;
  seekBar.value = (videoEl.currentTime / videoEl.duration * 1000) | 0;
  timeLabel.textContent = fmt(videoEl.currentTime) + ' / ' + fmt(videoEl.duration);
});

videoEl.addEventListener('play',  () => playBtn.textContent = '⏸');
videoEl.addEventListener('pause', () => playBtn.textContent = '▶');
videoEl.addEventListener('ended', () => playBtn.textContent = '▶');

playBtn.addEventListener('click', () => {
  videoEl.paused ? videoEl.play() : videoEl.pause();
});

seekBar.addEventListener('input', () => {
  if (!videoEl.duration) return;
  videoEl.currentTime = videoEl.duration * seekBar.value / 1000;
});

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ─── Canvas resize ────────────────────────────────────────
const ro = new ResizeObserver(resizeCanvas);
ro.observe(canvasArea);
ro.observe(videoEl);

function resizeCanvas() {
  const rect = videoEl.getBoundingClientRect();
  if (!rect.width || !rect.height) return;
  // Save current drawing
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width  = rect.width;
  canvas.height = rect.height;
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
  canvas.style.left   = rect.left - canvasArea.getBoundingClientRect().left + 'px';
  canvas.style.top    = rect.top  - canvasArea.getBoundingClientRect().top  + 'px';
  redrawAll();
}

// ─── Color / size ─────────────────────────────────────────
colorBtn.addEventListener('click', () => colorInput.click());
colorInput.addEventListener('input', e => {
  state.color = e.target.value;
  colorBtn.style.background = state.color;
});
sizeSlider.addEventListener('input', e => {
  state.lineWidth = +e.target.value;
});

// ─── Tool selection ───────────────────────────────────────
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tool = btn.dataset.tool;
    canvas.style.cursor = state.tool === 'eraser' ? 'cell' : 'crosshair';
  });
});

// ─── Undo / Clear ─────────────────────────────────────────
undoBtn.addEventListener('click', () => {
  state.strokes.pop();
  redrawAll();
});
clearBtn.addEventListener('click', () => {
  state.strokes = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// ─── Pointer helpers ──────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: src.clientX - rect.left,
    y: src.clientY - rect.top,
  };
}

// ─── Drawing ──────────────────────────────────────────────
canvas.addEventListener('pointerdown', startDraw);
canvas.addEventListener('pointermove', moveDraw);
canvas.addEventListener('pointerup',   endDraw);
canvas.addEventListener('pointerleave',endDraw);
canvas.addEventListener('touchstart',  e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',   e => e.preventDefault(), { passive: false });

function startDraw(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  state.drawing = true;
  state.startX = x;
  state.startY = y;
  state.currentStroke = [{ x, y }];
  if (state.tool !== 'pen' && state.tool !== 'eraser') {
    state.snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
}

function moveDraw(e) {
  if (!state.drawing) return;
  e.preventDefault();
  const { x, y } = getPos(e);

  if (state.tool === 'pen') {
    drawPenSegment(state.currentStroke[state.currentStroke.length - 1], {x,y});
    state.currentStroke.push({ x, y });
  } else if (state.tool === 'eraser') {
    eraseAt(x, y);
    state.currentStroke.push({ x, y });
  } else {
    // Shape preview
    ctx.putImageData(state.snapshot, 0, 0);
    drawShape(state.tool, state.startX, state.startY, x, y, state.color, state.lineWidth, false);
  }
}

function endDraw(e) {
  if (!state.drawing) return;
  state.drawing = false;
  const p = e.changedTouches ? e.changedTouches[0] : e;
  const rect = canvas.getBoundingClientRect();
  const x = p.clientX - rect.left;
  const y = p.clientY - rect.top;

  if (state.tool === 'pen' || state.tool === 'eraser') {
    state.strokes.push({
      type: state.tool,
      points: [...state.currentStroke],
      color: state.color,
      lineWidth: state.lineWidth,
    });
  } else {
    state.strokes.push({
      type: 'shape',
      shape: state.tool,
      x1: state.startX, y1: state.startY,
      x2: x, y2: y,
      color: state.color,
      lineWidth: state.lineWidth,
    });
  }
}

// ─── Draw helpers ─────────────────────────────────────────
function setupCtx(color, lw) {
  ctx.strokeStyle = color;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
}

function drawPenSegment(from, to) {
  setupCtx(state.color, state.lineWidth);
  ctx.globalCompositeOperation = 'source-over';
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(to.x, to.y);
  ctx.stroke();
}

function eraseAt(x, y) {
  const r = state.lineWidth * 4;
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

function drawShape(shape, x1, y1, x2, y2, color, lw) {
  ctx.globalCompositeOperation = 'source-over';
  setupCtx(color, lw);
  ctx.beginPath();
  if (shape === 'line') {
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  } else if (shape === 'rect') {
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
  } else if (shape === 'circle') {
    const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
    const rx = Math.abs(x2 - x1) / 2, ry = Math.abs(y2 - y1) / 2;
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else if (shape === 'arrow') {
    drawArrow(x1, y1, x2, y2, lw);
  }
}

function drawArrow(x1, y1, x2, y2, lw) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const headLen = Math.max(lw * 5, 16);
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fillStyle = ctx.strokeStyle;
  ctx.fill();
}

function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of state.strokes) {
    if (s.type === 'pen') {
      if (s.points.length < 2) continue;
      setupCtx(s.color, s.lineWidth);
      ctx.globalCompositeOperation = 'source-over';
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
      ctx.stroke();
    } else if (s.type === 'eraser') {
      for (const p of s.points) {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(p.x, p.y, s.lineWidth * 4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    } else if (s.type === 'shape') {
      drawShape(s.shape, s.x1, s.y1, s.x2, s.y2, s.color, s.lineWidth);
    }
  }
}
</script>
</body>
</html>
