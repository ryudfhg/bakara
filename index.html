<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>動画ドロー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f12;
  --surface: #1a1a20;
  --surface2: #24242e;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --text: #e8e8f0;
  --text-dim: #7878a0;
  --border: #2e2e3e;
}

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 700; flex: 1; }
header h1 span { color: var(--accent); }

#open-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
#file-input { display: none; }

#drop-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-dim);
  padding: 32px;
  text-align: center;
}
#drop-zone svg { opacity: 0.35; }
#drop-zone p { font-size: 15px; line-height: 1.6; }
#drop-zone small { font-size: 12px; opacity: 0.5; }

#workspace {
  display: none;
  flex: 1;
  flex-direction: column;
  min-height: 0;
}
#workspace.active { display: flex; }

#canvas-area {
  flex: 1;
  min-height: 0;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#video-el {
  max-width: 100%;
  max-height: 100%;
  display: block;
  pointer-events: none;
  user-select: none;
}

#draw-canvas {
  position: absolute;
  touch-action: none;
  cursor: default;
}

/* 描画モードヒント */
#mode-hint {
  position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(108,99,255,0.9);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 14px;
  border-radius: 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
  white-space: nowrap;
  z-index: 10;
}
#mode-hint.show { opacity: 1; }

/* 選択中オブジェクトのアクションボタン */
#obj-actions {
  position: absolute;
  display: none;
  gap: 6px;
  z-index: 20;
  pointer-events: auto;
}
#obj-actions.show { display: flex; }
.obj-act-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.obj-act-btn.del { color: var(--accent2); border-color: var(--accent2); }

/* bottom panel */
#bottom-panel {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

#tool-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex-wrap: nowrap;
}
#tool-bar::-webkit-scrollbar { display: none; }

/* モードボタン群 */
.mode-group {
  display: flex;
  gap: 3px;
  background: var(--surface2);
  border-radius: 9px;
  padding: 3px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.mode-btn {
  height: 34px;
  padding: 0 10px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s, color 0.12s;
}
.mode-btn.active { background: var(--accent); color: #fff; }

.tool-sep {
  width: 1px; height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* 図形ツール */
.tool-group {
  display: flex;
  gap: 3px;
  background: var(--surface2);
  border-radius: 9px;
  padding: 3px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.tool-btn {
  width: 34px; height: 34px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s, color 0.12s;
}
.tool-btn.active { background: var(--accent); color: #fff; }
.tool-btn:not(.active):active { background: var(--border); }

/* カラー */
#color-wrap { position: relative; flex-shrink: 0; display: flex; align-items: center; }
#color-swatch {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 3px solid var(--border);
  cursor: pointer;
  display: block;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
#color-input {
  position: absolute;
  top: 0; left: 0;
  width: 34px; height: 34px;
  opacity: 0;
  cursor: pointer;
  border: none;
  padding: 0;
}

/* サイズ */
.slider-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.label-sm { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
#size-slider {
  width: 70px;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
#size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
}

/* undo */
.tool-btn.danger { color: var(--accent2); }

/* video controls */
#video-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px 7px;
}
.ctrl-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 16px;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { background: var(--accent); }

#time-label {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 84px;
  text-align: right;
  flex-shrink: 0;
}

/* film strip */
#timeline-wrap {
  flex: 1;
  position: relative;
  height: 38px;
  overflow: hidden;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: grab;
  user-select: none;
  touch-action: none;
}
#timeline-wrap:active { cursor: grabbing; }
#film-strip {
  display: flex;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  will-change: transform;
}
.film-frame {
  flex-shrink: 0;
  width: 48px; height: 38px;
  background: #1a1a20;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.film-frame canvas { width: 100%; height: 100%; display: block; }
#playhead {
  position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 2px;
  background: var(--accent);
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 2;
}
#playhead::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 6px solid var(--accent);
}
</style>
</head>
<body>

<header>
  <h1>🎬 <span>動画</span>ドロー</h1>
  <button id="open-btn" onclick="document.getElementById('file-input').click()">動画を開く</button>
  <input type="file" id="file-input" accept="video/*">
</header>

<div id="drop-zone">
  <svg width="64" height="64" viewBox="0 0 72 72" fill="none">
    <rect x="8" y="14" width="56" height="44" rx="6" stroke="#6c63ff" stroke-width="3"/>
    <circle cx="26" cy="30" r="5" stroke="#6c63ff" stroke-width="2.5"/>
    <path d="M8 46l14-12 10 9 12-14 20 17" stroke="#6c63ff" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M36 36v-16M29 26l7-7 7 7" stroke="#ff6584" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <p>「動画を開く」で<br>動画ファイルを選択してください</p>
  <small>MP4 / MOV / WebM など対応</small>
</div>

<div id="workspace">
  <div id="canvas-area">
    <video id="video-el" playsinline></video>
    <canvas id="draw-canvas"></canvas>
    <div id="mode-hint"></div>
    <div id="obj-actions">
      <button class="obj-act-btn" id="obj-color-btn">🎨 色</button>
      <button class="obj-act-btn del" id="obj-delete-btn">🗑 削除</button>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="tool-bar">

      <!-- モード切替 -->
      <div class="mode-group">
        <button class="mode-btn active" id="mode-select">👆 選択</button>
        <button class="mode-btn" id="mode-draw">✏️ 描画</button>
      </div>

      <div class="tool-sep"></div>

      <!-- 図形ツール（描画モード時のみ有効） -->
      <div class="tool-group" id="shape-tools">
        <button class="tool-btn active" data-tool="pen"    title="ペン">✏️</button>
        <button class="tool-btn"        data-tool="line"   title="直線">╱</button>
        <button class="tool-btn"        data-tool="rect"   title="矩形">▭</button>
        <button class="tool-btn"        data-tool="circle" title="円">○</button>
        <button class="tool-btn"        data-tool="arrow"  title="矢印">➔</button>
      </div>

      <!-- カラー -->
      <div id="color-wrap">
        <div id="color-swatch" style="background:#6c63ff;"></div>
        <input type="color" id="color-input" value="#6c63ff">
      </div>

      <!-- 太さ -->
      <div class="slider-wrap">
        <span class="label-sm">太さ</span>
        <input type="range" id="size-slider" min="1" max="30" value="4">
      </div>

      <div class="tool-sep"></div>

      <div class="tool-group">
        <button class="tool-btn" id="undo-btn" title="元に戻す" style="font-size:14px;">↩</button>
        <button class="tool-btn danger" id="clear-btn" title="全消去" style="font-size:12px;">✕</button>
      </div>

    </div>

    <div id="video-controls">
      <button class="ctrl-btn" id="play-btn">▶</button>
      <div id="timeline-wrap">
        <div id="film-strip"></div>
        <div id="playhead"></div>
      </div>
      <span id="time-label">0:00 / 0:00</span>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const S = {
  mode: 'select',      // 'select' | 'draw'
  tool: 'pen',
  color: '#6c63ff',
  lineWidth: 4,

  objects: [],         // all placed objects
  selectedId: null,

  // drawing
  isDrawing: false,
  drawStart: null,
  penPoints: [],
  snapshot: null,      // ImageData for shape preview

  // moving
  isMoving: false,
  moveObjId: null,
  moveStart: null,     // {x,y} pointer
  moveObjOrigin: null, // original object position
};

let nextId = 1;

// ════════════════════════════════════════════
// ELEMENTS
// ════════════════════════════════════════════
const fileInput    = document.getElementById('file-input');
const videoEl      = document.getElementById('video-el');
const canvas       = document.getElementById('draw-canvas');
const ctx          = canvas.getContext('2d');
const workspace    = document.getElementById('workspace');
const dropZone     = document.getElementById('drop-zone');
const canvasArea   = document.getElementById('canvas-area');
const playBtn      = document.getElementById('play-btn');
const timeLabel    = document.getElementById('time-label');
const colorInput   = document.getElementById('color-input');
const colorSwatch  = document.getElementById('color-swatch');
const sizeSlider   = document.getElementById('size-slider');
const undoBtn      = document.getElementById('undo-btn');
const clearBtn     = document.getElementById('clear-btn');
const modeHint     = document.getElementById('mode-hint');
const objActions   = document.getElementById('obj-actions');
const objColorBtn  = document.getElementById('obj-color-btn');
const objDeleteBtn = document.getElementById('obj-delete-btn');
const filmStrip    = document.getElementById('film-strip');
const timelineWrap = document.getElementById('timeline-wrap');
const modeBtns     = { select: document.getElementById('mode-select'), draw: document.getElementById('mode-draw') };

// ════════════════════════════════════════════
// FILE
// ════════════════════════════════════════════
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  videoEl.src = URL.createObjectURL(file);
  videoEl.load();
  dropZone.style.display = 'none';
  workspace.classList.add('active');
});

// ════════════════════════════════════════════
// VIDEO
// ════════════════════════════════════════════
videoEl.addEventListener('loadedmetadata', () => { resizeCanvas(); buildFilmStrip(); });
videoEl.addEventListener('timeupdate', updateTimeline);
videoEl.addEventListener('play',  () => playBtn.textContent = '⏸');
videoEl.addEventListener('pause', () => playBtn.textContent = '▶');
videoEl.addEventListener('ended', () => playBtn.textContent = '▶');
playBtn.addEventListener('click', () => videoEl.paused ? videoEl.play() : videoEl.pause());

function fmt(s) {
  if (!isFinite(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

// ════════════════════════════════════════════
// CANVAS RESIZE
// ════════════════════════════════════════════
new ResizeObserver(resizeCanvas).observe(canvasArea);
new ResizeObserver(resizeCanvas).observe(videoEl);

function resizeCanvas() {
  const vr = videoEl.getBoundingClientRect();
  const ar = canvasArea.getBoundingClientRect();
  if (!vr.width || !vr.height) return;
  canvas.width  = vr.width;
  canvas.height = vr.height;
  canvas.style.width  = vr.width  + 'px';
  canvas.style.height = vr.height + 'px';
  canvas.style.left   = (vr.left - ar.left) + 'px';
  canvas.style.top    = (vr.top  - ar.top)  + 'px';
  render();
}

// ════════════════════════════════════════════
// MODE
// ════════════════════════════════════════════
function setMode(m) {
  S.mode = m;
  S.selectedId = null;
  hideObjActions();

  Object.entries(modeBtns).forEach(([k,btn]) => btn.classList.toggle('active', k === m));

  if (m === 'select') {
    canvas.style.cursor = 'default';
    canvas.style.pointerEvents = 'auto';
    showHint('👆 選択・移動モード', 1200);
  } else {
    canvas.style.cursor = 'crosshair';
    canvas.style.pointerEvents = 'auto';
    showHint('✏️ 描画モード — 図形を1つ描くと自動で選択に戻ります', 1800);
  }
  render();
}

modeBtns.select.addEventListener('click', () => setMode('select'));
modeBtns.draw.addEventListener('click',   () => setMode('draw'));

function showHint(text, duration) {
  modeHint.textContent = text;
  modeHint.classList.add('show');
  clearTimeout(modeHint._t);
  modeHint._t = setTimeout(() => modeHint.classList.remove('show'), duration);
}

// ════════════════════════════════════════════
// COLOR / SIZE
// ════════════════════════════════════════════
colorInput.addEventListener('input', e => {
  S.color = e.target.value;
  colorSwatch.style.background = S.color;
  // 選択中オブジェクトに即反映
  if (S.selectedId !== null) {
    const obj = S.objects.find(o => o.id === S.selectedId);
    if (obj) { obj.color = S.color; render(); }
  }
});

// swatchをタップ→colorInputを開く
colorSwatch.addEventListener('click', () => colorInput.click());

sizeSlider.addEventListener('input', e => { S.lineWidth = +e.target.value; });

// ════════════════════════════════════════════
// TOOL SELECTION
// ════════════════════════════════════════════
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.tool = btn.dataset.tool;
    if (S.mode === 'draw') canvas.style.cursor = 'crosshair';
  });
});

// ════════════════════════════════════════════
// UNDO / CLEAR
// ════════════════════════════════════════════
undoBtn.addEventListener('click', () => {
  S.objects.pop();
  S.selectedId = null;
  hideObjActions();
  render();
});
clearBtn.addEventListener('click', () => {
  S.objects = [];
  S.selectedId = null;
  hideObjActions();
  render();
});

// ════════════════════════════════════════════
// OBJECT ACTIONS (色変更・削除)
// ════════════════════════════════════════════
// 選択オブジェクトの色変更
const objColorInput = document.createElement('input');
objColorInput.type = 'color';
objColorInput.style.cssText = 'position:absolute;opacity:0;width:0;height:0;';
document.body.appendChild(objColorInput);

objColorBtn.addEventListener('click', () => {
  const obj = S.objects.find(o => o.id === S.selectedId);
  if (!obj) return;
  objColorInput.value = obj.color;
  objColorInput.click();
});
objColorInput.addEventListener('input', e => {
  const obj = S.objects.find(o => o.id === S.selectedId);
  if (!obj) return;
  obj.color = e.target.value;
  S.color = e.target.value;
  colorSwatch.style.background = e.target.value;
  colorInput.value = e.target.value;
  render();
});

objDeleteBtn.addEventListener('click', () => {
  S.objects = S.objects.filter(o => o.id !== S.selectedId);
  S.selectedId = null;
  hideObjActions();
  render();
});

function showObjActions(x, y) {
  objActions.classList.add('show');
  // position above the tap point
  const ar = canvasArea.getBoundingClientRect();
  let top = y - 50;
  if (top < 4) top = y + 10;
  objActions.style.left = Math.max(4, Math.min(ar.width - 130, x - 60)) + 'px';
  objActions.style.top  = top + 'px';
}
function hideObjActions() { objActions.classList.remove('show'); }

// ════════════════════════════════════════════
// POINTER HELPERS
// ════════════════════════════════════════════
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

// ════════════════════════════════════════════
// HIT TEST
// ════════════════════════════════════════════
function hitTest(obj, x, y) {
  const PAD = Math.max(10, (obj.lineWidth || 4) * 2);
  if (obj.type === 'pen') {
    for (let i = 0; i < obj.points.length - 1; i++) {
      if (distToSegment(x, y, obj.points[i], obj.points[i+1]) < PAD) return true;
    }
    return false;
  }
  if (obj.type === 'line' || obj.type === 'arrow') {
    return distToSegment(x, y, {x:obj.x1,y:obj.y1}, {x:obj.x2,y:obj.y2}) < PAD;
  }
  if (obj.type === 'rect') {
    const minX = Math.min(obj.x1,obj.x2), maxX = Math.max(obj.x1,obj.x2);
    const minY = Math.min(obj.y1,obj.y2), maxY = Math.max(obj.y1,obj.y2);
    return distToRect(x, y, minX, minY, maxX, maxY) < PAD;
  }
  if (obj.type === 'circle') {
    const cx=(obj.x1+obj.x2)/2, cy=(obj.y1+obj.y2)/2;
    const rx=Math.abs(obj.x2-obj.x1)/2, ry=Math.abs(obj.y2-obj.y1)/2;
    if (rx < 1 || ry < 1) return false;
    const nx=(x-cx)/rx, ny=(y-cy)/ry;
    const d = Math.abs(Math.sqrt(nx*nx+ny*ny) - 1) * Math.min(rx,ry);
    return d < PAD;
  }
  return false;
}

function distToSegment(px, py, a, b) {
  const dx=b.x-a.x, dy=b.y-a.y;
  const len2=dx*dx+dy*dy;
  if (len2===0) return Math.hypot(px-a.x, py-a.y);
  const t=Math.max(0,Math.min(1,((px-a.x)*dx+(py-a.y)*dy)/len2));
  return Math.hypot(px-(a.x+t*dx), py-(a.y+t*dy));
}

function distToRect(px, py, x1, y1, x2, y2) {
  // Distance to nearest edge of rect (outline)
  const inside = px>=x1&&px<=x2&&py>=y1&&py<=y2;
  if (!inside) {
    const cx=Math.max(x1,Math.min(x2,px)), cy=Math.max(y1,Math.min(y2,py));
    return Math.hypot(px-cx, py-cy);
  }
  // inside: dist to nearest edge
  return Math.min(px-x1, x2-px, py-y1, y2-py);
}

// ════════════════════════════════════════════
// OBJECT MOVE HELPERS
// ════════════════════════════════════════════
function cloneObj(o) { return JSON.parse(JSON.stringify(o)); }

function translateObj(obj, dx, dy) {
  if (obj.type === 'pen') {
    obj.points = obj.points.map(p => ({x: p.x+dx, y: p.y+dy}));
  } else {
    obj.x1 += dx; obj.y1 += dy;
    obj.x2 += dx; obj.y2 += dy;
  }
}

// ════════════════════════════════════════════
// CANVAS EVENTS
// ════════════════════════════════════════════
canvas.addEventListener('touchstart', e => { if (S.mode !== 'select' || S.isDrawing) e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

canvas.addEventListener('pointerdown', onDown);
canvas.addEventListener('pointermove', onMove);
canvas.addEventListener('pointerup',   onUp);
canvas.addEventListener('pointerleave', onUp);

function onDown(e) {
  e.preventDefault();
  const pos = getPos(e);

  if (S.mode === 'select') {
    // find topmost hit object
    let hit = null;
    for (let i = S.objects.length - 1; i >= 0; i--) {
      if (hitTest(S.objects[i], pos.x, pos.y)) { hit = S.objects[i]; break; }
    }
    if (hit) {
      S.selectedId = hit.id;
      S.isMoving = true;
      S.moveObjId = hit.id;
      S.moveStart = pos;
      S.moveObjOrigin = cloneObj(hit);
      hideObjActions();
      canvas.setPointerCapture(e.pointerId);
    } else {
      S.selectedId = null;
      hideObjActions();
    }
    render();
    return;
  }

  // draw mode
  S.isDrawing = true;
  S.drawStart = pos;
  S.penPoints = [pos];
  if (S.tool !== 'pen') {
    S.snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
  canvas.setPointerCapture(e.pointerId);
}

function onMove(e) {
  e.preventDefault();
  const pos = getPos(e);

  if (S.isMoving) {
    const dx = pos.x - S.moveStart.x;
    const dy = pos.y - S.moveStart.y;
    const obj = S.objects.find(o => o.id === S.moveObjId);
    if (!obj) return;
    // reset to origin then translate
    Object.assign(obj, cloneObj(S.moveObjOrigin));
    translateObj(obj, dx, dy);
    render();
    return;
  }

  if (!S.isDrawing) return;
  const pos2 = pos;

  if (S.tool === 'pen') {
    // draw segment incrementally
    const prev = S.penPoints[S.penPoints.length - 1];
    ctxSetup(S.color, S.lineWidth);
    ctx.globalCompositeOperation = 'source-over';
    ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(pos2.x, pos2.y); ctx.stroke();
    S.penPoints.push(pos2);
  } else {
    ctx.putImageData(S.snapshot, 0, 0);
    drawObjImmediate({ type: S.tool, x1: S.drawStart.x, y1: S.drawStart.y, x2: pos2.x, y2: pos2.y, color: S.color, lineWidth: S.lineWidth });
  }
}

function onUp(e) {
  if (S.isMoving) {
    S.isMoving = false;
    // show actions after move ends
    const obj = S.objects.find(o => o.id === S.moveObjId);
    if (obj) {
      const pos = getPos(e.changedTouches ? { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY } : e);
      showObjActions(pos.x, pos.y);
    }
    render();
    return;
  }

  if (!S.isDrawing) return;
  S.isDrawing = false;

  const src = e.changedTouches ? e.changedTouches[0] : e;
  const rect = canvas.getBoundingClientRect();
  const ex = src.clientX - rect.left, ey = src.clientY - rect.top;

  let obj;
  if (S.tool === 'pen') {
    if (S.penPoints.length < 2) { render(); return; }
    obj = { id: nextId++, type: 'pen', points: [...S.penPoints], color: S.color, lineWidth: S.lineWidth };
  } else {
    obj = { id: nextId++, type: S.tool, x1: S.drawStart.x, y1: S.drawStart.y, x2: ex, y2: ey, color: S.color, lineWidth: S.lineWidth };
  }

  S.objects.push(obj);
  S.selectedId = obj.id;
  showObjActions(ex, ey);

  // 描画後は選択モードに自動で戻る
  setMode('select');
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const obj of S.objects) {
    const selected = obj.id === S.selectedId;
    drawObjImmediate(obj, selected);
  }
}

function drawObjImmediate(obj, selected = false) {
  ctx.globalCompositeOperation = 'source-over';
  ctxSetup(obj.color, obj.lineWidth);

  if (selected) {
    // glow outline
    ctx.shadowColor = 'rgba(108,99,255,0.8)';
    ctx.shadowBlur  = 12;
  } else {
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur  = 0;
  }

  if (obj.type === 'pen') {
    if (obj.points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(obj.points[0].x, obj.points[0].y);
    for (let i = 1; i < obj.points.length; i++) ctx.lineTo(obj.points[i].x, obj.points[i].y);
    ctx.stroke();
  } else if (obj.type === 'line') {
    ctx.beginPath(); ctx.moveTo(obj.x1,obj.y1); ctx.lineTo(obj.x2,obj.y2); ctx.stroke();
  } else if (obj.type === 'rect') {
    ctx.strokeRect(obj.x1, obj.y1, obj.x2-obj.x1, obj.y2-obj.y1);
  } else if (obj.type === 'circle') {
    const cx=(obj.x1+obj.x2)/2, cy=(obj.y1+obj.y2)/2;
    const rx=Math.abs(obj.x2-obj.x1)/2, ry=Math.abs(obj.y2-obj.y1)/2;
    if (rx<1||ry<1) return;
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.stroke();
  } else if (obj.type === 'arrow') {
    drawArrow(obj.x1,obj.y1,obj.x2,obj.y2,obj.lineWidth,obj.color);
  }

  ctx.shadowBlur = 0;

  // selection handles
  if (selected) {
    drawSelectionBox(obj);
  }
}

function drawSelectionBox(obj) {
  const bb = getBoundingBox(obj);
  if (!bb) return;
  const pad = 8;
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(108,99,255,0.9)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 4]);
  ctx.strokeRect(bb.x - pad, bb.y - pad, bb.w + pad*2, bb.h + pad*2);
  ctx.setLineDash([]);
}

function getBoundingBox(obj) {
  if (obj.type === 'pen') {
    if (obj.points.length === 0) return null;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of obj.points) {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    }
    return { x: minX, y: minY, w: maxX-minX, h: maxY-minY };
  }
  const minX = Math.min(obj.x1,obj.x2), minY = Math.min(obj.y1,obj.y2);
  const maxX = Math.max(obj.x1,obj.x2), maxY = Math.max(obj.y1,obj.y2);
  return { x: minX, y: minY, w: maxX-minX, h: maxY-minY };
}

function ctxSetup(color, lw) {
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
}

function drawArrow(x1,y1,x2,y2,lw,color) {
  const angle = Math.atan2(y2-y1,x2-x1), h = Math.max(lw*5,16);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-h*Math.cos(angle-0.4), y2-h*Math.sin(angle-0.4));
  ctx.lineTo(x2-h*Math.cos(angle+0.4), y2-h*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
}

// ════════════════════════════════════════════
// FILM STRIP
// ════════════════════════════════════════════
const FRAME_W = 48, FRAME_H = 38, TOTAL_FRAMES = 30;
let filmBuilt = false, filmFrameEls = [];

function buildFilmStrip() {
  if (filmBuilt) return;
  filmBuilt = true;
  filmStrip.innerHTML = '';
  filmFrameEls = [];
  for (let i = 0; i < TOTAL_FRAMES; i++) {
    const div = document.createElement('div');
    div.className = 'film-frame';
    const c = document.createElement('canvas');
    c.width = FRAME_W; c.height = FRAME_H;
    div.appendChild(c); filmStrip.appendChild(div);
    filmFrameEls.push(c);
  }
  filmStrip.style.width = (FRAME_W * TOTAL_FRAMES) + 'px';
  captureFrames();
}

async function captureFrames() {
  const dur = videoEl.duration;
  if (!isFinite(dur) || dur === 0) return;
  const ov = document.createElement('video');
  ov.src = videoEl.src; ov.muted = true; ov.preload = 'auto';
  await new Promise(r => { ov.addEventListener('loadedmetadata', r, {once:true}); ov.load(); });
  for (let i = 0; i < TOTAL_FRAMES; i++) {
    ov.currentTime = (i / (TOTAL_FRAMES-1)) * dur;
    await new Promise(r => ov.addEventListener('seeked', r, {once:true}));
    const c = filmFrameEls[i];
    const cx = c.getContext('2d');
    const scale = Math.min(FRAME_W/ov.videoWidth, FRAME_H/ov.videoHeight);
    const dw=ov.videoWidth*scale, dh=ov.videoHeight*scale;
    cx.fillStyle='#111'; cx.fillRect(0,0,FRAME_W,FRAME_H);
    cx.drawImage(ov,(FRAME_W-dw)/2,(FRAME_H-dh)/2,dw,dh);
  }
}

function updateTimeline() {
  const t = videoEl.currentTime, dur = videoEl.duration||1;
  timeLabel.textContent = fmt(t) + ' / ' + fmt(dur);
  if (!tlDragging) filmStrip.style.transform = `translateX(${timeToOffset(t)}px)`;
}

function timeToOffset(t) {
  const dur = videoEl.duration||1;
  const ww = timelineWrap.getBoundingClientRect().width||200;
  return -((t/dur)*(FRAME_W*TOTAL_FRAMES) - ww/2);
}

let tlDragging=false, tlStartX=0, tlStartTime=0;
timelineWrap.addEventListener('pointerdown', e => {
  tlDragging=true; tlStartX=e.clientX; tlStartTime=videoEl.currentTime;
  timelineWrap.setPointerCapture(e.pointerId);
  videoEl.pause(); e.preventDefault();
});
timelineWrap.addEventListener('pointermove', e => {
  if(!tlDragging) return;
  const dx=e.clientX-tlStartX, dur=videoEl.duration||1;
  const newT=Math.max(0,Math.min(dur, tlStartTime-(dx/(FRAME_W*TOTAL_FRAMES))*dur));
  videoEl.currentTime=newT;
  filmStrip.style.transform=`translateX(${timeToOffset(newT)}px)`;
  timeLabel.textContent=fmt(newT)+' / '+fmt(dur);
});
timelineWrap.addEventListener('pointerup',    ()=>{ tlDragging=false; });
timelineWrap.addEventListener('pointerleave', ()=>{ tlDragging=false; });
timelineWrap.addEventListener('touchstart', e=>e.preventDefault(),{passive:false});
timelineWrap.addEventListener('touchmove',  e=>e.preventDefault(),{passive:false});
</script>
